name: Static Analysis

on: [push, pull_request]

jobs:
  valgrind-memcheck:
    name: Valgrind Memory Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev valgrind \
            libxml2-dev libncurses-dev libssl-dev libjansson-dev \
            libedit-dev liburiparser-dev uuid-dev

      - name: Cache Asterisk source
        id: cache-asterisk
        uses: actions/cache@v4
        with:
          path: ~/asterisk-20.11.0-source
          key: asterisk-static-20.11.0-${{ runner.os }}

      - name: Download Asterisk 20.11.0
        if: steps.cache-asterisk.outputs.cache-hit != 'true'
        run: |
          cd ~
          wget -q https://downloads.asterisk.org/pub/telephony/asterisk/releases/asterisk-20.11.0.tar.gz
          tar xzf asterisk-20.11.0.tar.gz
          mv asterisk-20.11.0 asterisk-20.11.0-source

      - name: Install Asterisk headers
        run: |
          cd ~/asterisk-20.11.0-source
          ./configure --disable-all --with-sqlite3 --disable-build-native \
            --without-pjproject --without-dahdi --without-libpri 2>&1 | tail -10
          make -j$(nproc) 2>&1 | tail -10
          sudo make install 2>&1 | tail -5

      - name: Build with debug symbols
        run: |
          make clean
          CFLAGS="-fPIC -O0 -g3 -Wall -Wextra -std=gnu11 \
            -DASTERISK_VERSION_NUM=200190 \
            -DAST_MODULE_SELF_SYM=__internal_chan_dongle_self \
            -DAST_MODULE=\"chan_dongle\" \
            -D_GNU_SOURCE -DHAVE_CONFIG_H -I. \
            -include $(pwd)/preinclude.h \
            -idirafter /usr/include/asterisk" \
          make 2>&1

      - name: Run valgrind on tests
        run: |
          make -C tests clean
          make -C tests
          valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all \
            ./tests/test_at_parse 2>&1 | tail -50

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-extended,security-and-quality

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev \
            libxml2-dev libncurses-dev libssl-dev libjansson-dev \
            libedit-dev liburiparser-dev uuid-dev

      - name: Cache Asterisk source
        id: cache-asterisk
        uses: actions/cache@v4
        with:
          path: ~/asterisk-20.11.0-source
          key: asterisk-codeql-20.11.0-${{ runner.os }}

      - name: Download Asterisk 20.11.0
        if: steps.cache-asterisk.outputs.cache-hit != 'true'
        run: |
          cd ~
          wget -q https://downloads.asterisk.org/pub/telephony/asterisk/releases/asterisk-20.11.0.tar.gz
          tar xzf asterisk-20.11.0.tar.gz
          mv asterisk-20.11.0 asterisk-20.11.0-source

      - name: Install Asterisk headers
        run: |
          cd ~/asterisk-20.11.0-source
          ./configure --disable-all --with-sqlite3 --disable-build-native \
            --without-pjproject --without-dahdi --without-libpri 2>&1 | tail -10
          make -j$(nproc) 2>&1 | tail -10
          sudo make install 2>&1 | tail -5

      - name: Build for CodeQL
        run: |
          make clean
          make 2>&1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
